name: satsuma_player
description: "A modernized multi-platform music player app."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# all application dependencies
dependencies:
  flutter:
    sdk: flutter

  # Core Utilities
  path: ^1.9.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  
  # Database (Local Storage)
  drift: ^2.16.0
  drift_flutter: ^0.2.0
  sqlite3: ^2.1.0
  sqlite3_flutter_libs: ^0.5.21 # Vital for Windows support

  # Media Handling
  just_audio: ^0.9.36
  just_audio_windows: ^0.2.1
  metadata_god: ^0.5.0
  on_audio_query: ^2.9.0
  media_scanner: ^2.2.0

  # Extras
  youtube_explode_dart: ^2.2.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.16.0  # Keep in sync with drift version
  build_runner: ^2.4.8
  flutter_lints: ^5.0.0 # Standard for 2026 projects

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# program icon config
flutter_launcher_icons:
  # REQUIRED: The path to your icon file
  image_path: "assets/images/mobile_icon.png"
  # OPTIONAL: Set to true if you want the icon applied to iOS
  ios: true
  # OPTIONAL: Set to true if you want the icon applied to Android
  android: true 
  # COMMAND: flutter pub run flutter_launcher_icons:main
  # ios doesn't like transparent bg's
  # remove_alpha_ios: true
  # OPTIONAL (Android Only): Changes the adaptive icon foreground/background.
  # This is needed for modern Android devices.
  adaptive_icon_background: "#FFFFFF" # Use a color hex code
  adaptive_icon_foreground: "assets/images/mobile_icon.png" 
  
  # web: 
  #   generate: true
  #   image_path: "assets/images/app_icon.png"
    # background_color: "#hexcode" # Optional

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is included
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
      # playlist covers
      - assets/covers/
      - branding/
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
